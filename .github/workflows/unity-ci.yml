name: Unity CI

on:
  pull_request:
  push:
    branches:
      - master
      - main
      - feature/**
      - chore/**
  workflow_dispatch:

concurrency:
  group: unity-ci-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read
  checks: write

jobs:
  git-hygiene:
    name: Git hygiene
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          lfs: true

      - name: Fail if ignored files are tracked
        shell: bash
        run: |
          ignored_files="$(git ls-files -ci --exclude-standard)"
          if [ -n "$ignored_files" ]; then
            echo "These tracked files match .gitignore and should be removed from the index:"
            echo "$ignored_files"
            exit 1
          fi

  unity-tests:
    name: Unity tests
    runs-on: ubuntu-latest
    needs: git-hygiene
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          lfs: true

      - name: Cache Unity Library
        uses: actions/cache@v4
        with:
          path: Library
          key: Library-${{ runner.os }}-${{ hashFiles('ProjectSettings/ProjectVersion.txt', 'Packages/manifest.json', 'Packages/packages-lock.json') }}
          restore-keys: |
            Library-${{ runner.os }}-
            Library-

      - name: Run Unity tests
        id: unity-tests
        uses: game-ci/unity-test-runner@v4
        env:
          UNITY_LICENSE: ${{ secrets.UNITY_LICENSE }}
          UNITY_EMAIL: ${{ secrets.UNITY_EMAIL }}
          UNITY_PASSWORD: ${{ secrets.UNITY_PASSWORD }}
        with:
          githubToken: ${{ secrets.GITHUB_TOKEN }}

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: unity-test-results
          path: ${{ steps.unity-tests.outputs.artifactsPath }}

  android-build:
    name: Android build
    runs-on: ubuntu-latest
    needs: git-hygiene
    if: github.event_name == 'workflow_dispatch'
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          lfs: true

      - name: Cache Unity Library
        uses: actions/cache@v4
        with:
          path: Library
          key: Library-Android-${{ hashFiles('ProjectSettings/ProjectVersion.txt', 'Packages/manifest.json', 'Packages/packages-lock.json') }}
          restore-keys: |
            Library-Android-
            Library-

      - name: Build Android player
        uses: game-ci/unity-builder@v4
        env:
          UNITY_LICENSE: ${{ secrets.UNITY_LICENSE }}
          UNITY_EMAIL: ${{ secrets.UNITY_EMAIL }}
          UNITY_PASSWORD: ${{ secrets.UNITY_PASSWORD }}
        with:
          targetPlatform: Android

      - name: Upload Android build
        uses: actions/upload-artifact@v4
        with:
          name: android-build
          path: build/Android
